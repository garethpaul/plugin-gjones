name: Check

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix:
    name: check (${{ matrix.os }}, node-${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            node: 20
          - os: ubuntu-24.04
            node: 22
          - os: ubuntu-24.04
            node: 24
          - os: windows-2025
            node: 24
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.1.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Audit full dependency graph
        run: node scripts/check-audit.js

      - name: Run checks
        run: npm test

      - name: Validate package contents
        run: npm pack --dry-run

  consumer:
    name: packed consumer audit (node-24)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.1.0
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Audit packed consumer graph
        run: npm run audit:consumer

  check:
    name: check
    if: ${{ always() }}
    needs: [matrix, consumer]
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Require every platform lane
        env:
          MATRIX_RESULT: ${{ needs.matrix.result }}
          CONSUMER_RESULT: ${{ needs.consumer.result }}
        run: test "$MATRIX_RESULT" = success && test "$CONSUMER_RESULT" = success
